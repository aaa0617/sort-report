<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進階氣泡排序動畫</title>
    <style>
        /* 深色背景與整體風格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* 深藍黑色背景 */
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { color: #38bdf8; margin-bottom: 10px; }

        /* 統計資訊面板 */
        #stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #38bdf8; display: block; }
        .stat-label { font-size: 0.8em; color: #94a3b8; }

        /* 圖表容器 */
        #container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 350px;
            width: 90%;
            max-width: 800px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        /* 長條圖樣式 */
        .bar {
            flex: 1;
            margin: 0 4px;
            background: #0ea5e9; /* 預設深藍 */
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 12px;
            font-weight: bold;
            padding-top: 5px;
        }

        /* 按鈕樣式 */
        .controls { display: flex; gap: 10px; }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #0ea5e9; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        
        .back-link { color: #94a3b8; text-decoration: none; margin-bottom: 10px; font-size: 0.9em; }
        .back-link:hover { color: #38bdf8; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">← 回首頁</a>
<h2>氣泡排序法 Bubble Sort</h2>

<div id="stats-container">
    <div class="stat-item">
        <span id="compare-count" class="stat-value">0</span>
        <span class="stat-label">比較次數</span>
    </div>
    <div class="stat-item">
        <span id="swap-count" class="stat-value">0</span>
        <span class="stat-label">交換次數</span>
    </div>
    <div class="stat-item">
        <span id="array-size" class="stat-value">8</span>
        <span class="stat-label">陣列大小</span>
    </div>
</div>

<div id="container"></div>

<div class="controls">
    <button id="start-btn" onclick="startSort()">開始排序</button>
    <button onclick="resetArray()">隨機重置</button>
</div>

<script>
    let arr = [64, 34, 25, 12, 22, 11, 90, 45];
    let compareCount = 0;
    let swapCount = 0;
    const container = document.getElementById("container");
    const startBtn = document.getElementById("start-btn");

    function draw(activeIndices = [], sortedIndex = -1) {
        container.innerHTML = "";
        arr.forEach((value, index) => {
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${(value / Math.max(...arr)) * 100}%`; 
            bar.innerText = value;

            // 顏色控制邏輯
            if (activeIndices.includes(index)) {
                bar.style.background = "#ef4444"; // 正在比較的顏色 (紅色)
            } else if (index >= arr.length - sortedIndex) {
                bar.style.background = "#22c55e"; // 已完成排序的顏色 (綠色)
            }
            
            container.appendChild(bar);
        });
    }

    function updateStats() {
        document.getElementById("compare-count").innerText = compareCount;
        document.getElementById("swap-count").innerText = swapCount;
    }

    function resetArray() {
        arr = Array.from({length: 8}, () => Math.floor(Math.random() * 90) + 10);
        compareCount = 0;
        swapCount = 0;
        updateStats();
        draw();
        startBtn.disabled = false;
    }

    async function startSort() {
        startBtn.disabled = true;
        await bubbleSort();
    }

    async function bubbleSort() {
        let n = arr.length;
        for (let i = 0; i < n; i++) {
            let swapped = false;
            for (let j = 0; j < n - i - 1; j++) {
                compareCount++;
                updateStats();
                
                // 標記正在比較的兩個元素
                draw([j, j + 1], i);
                await new Promise(r => setTimeout(r, 400));

                if (arr[j] > arr[j + 1]) {
                    swapCount++;
                    updateStats();
                    [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    swapped = true;
                    draw([j, j + 1], i);
                    await new Promise(r => setTimeout(r, 400));
                }
            }
            if (!swapped) break; // 優化：如果這輪沒交換，代表已排好
        }
        draw([], arr.length); // 最後全部標示為綠色
    }

    // 初始化
    draw();
</script>

</body>
</html>
