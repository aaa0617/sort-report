<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進階選擇排序動畫</title>
    <style>
        /* 基礎頁面樣式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* 確保內容水平置中 */
            min-height: 100vh;
        }

        /* 強力置中回首頁連結 */
        .back-link { 
            color: #94a3b8; 
            text-decoration: none; 
            margin: 0 auto 15px auto; /* 上 0, 左右自動, 下 15px */
            display: table; /* 讓 margin: auto 生效 */
            transition: color 0.2s;
            font-size: 0.95em;
        }
        .back-link:hover { 
            color: #38bdf8; 
        }

        h2 { color: #38bdf8; margin-top: 0; margin-bottom: 20px; text-align: center; }

        /* 統計資訊面板 */
        #stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #38bdf8; display: block; }
        .stat-label { font-size: 0.8em; color: #94a3b8; }

        /* 圖表容器 */
        #container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 90%;
            max-width: 800px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .bar {
            flex: 1;
            margin: 0 4px;
            background: #38bdf8;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 12px;
            font-weight: bold;
            padding-top: 5px;
            color: white;
        }

        .controls { display: flex; gap: 15px; }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #0ea5e9; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← 回首頁</a>
    <h2>選擇排序法 Selection Sort</h2>

    <div id="stats-container">
        <div class="stat-item">
            <span id="compare-count" class="stat-value">0</span>
            <span class="stat-label">比較次數</span>
        </div>
        <div class="stat-item">
            <span id="swap-count" class="stat-value">0</span>
            <span class="stat-label">交換次數</span>
        </div>
        <div class="stat-item">
            <span id="array-size" class="stat-value">8</span>
            <span class="stat-label">陣列大小</span>
        </div>
    </div>

    <div id="container"></div>

    <div class="controls">
        <button id="start-btn" onclick="startSort()">開始排序</button>
        <button id="reset-btn" onclick="resetArray()">隨機重置</button>
    </div>

<script>
    let arr = [];
    let compareCount = 0;
    let swapCount = 0;
    const container = document.getElementById("container");
    const startBtn = document.getElementById("start-btn");
    const resetBtn = document.getElementById("reset-btn");

    function resetArray() {
        arr = [];
        for (let i = 0; i < 8; i++) {
            arr.push(Math.floor(Math.random() * 90) + 10);
        }
        compareCount = 0;
        swapCount = 0;
        updateStats();
        draw();
        startBtn.disabled = false;
        resetBtn.disabled = false;
    }

    function updateStats() {
        document.getElementById("compare-count").innerText = compareCount;
        document.getElementById("swap-count").innerText = swapCount;
        document.getElementById("array-size").innerText = arr.length;
    }

    function draw(scanningIdx = -1, minIdx = -1, sortedIdx = -1) {
        container.innerHTML = "";
        const maxVal = Math.max(...arr);
        arr.forEach((val, idx) => {
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${(val / maxVal) * 100}%`;
            bar.innerText = val;
            if (idx <= sortedIdx) bar.style.background = "#22c55e"; 
            else if (idx === minIdx) bar.style.background = "#f59e0b";
            else if (idx === scanningIdx) bar.style.background = "#ef4444";
            container.appendChild(bar);
        });
    }

    async function startSort() {
        startBtn.disabled = true;
        resetBtn.disabled = true;
        let n = arr.length;
        for (let i = 0; i < n; i++) {
            let minIndex = i;
            draw(-1, minIndex, i - 1);
            await new Promise(r => setTimeout(r, 400));
            for (let j = i + 1; j < n; j++) {
                compareCount++;
                updateStats();
                draw(j, minIndex, i - 1);
                await new Promise(r => setTimeout(r, 400));
                if (arr[j] < arr[minIndex]) {
                    minIndex = j;
                    draw(-1, minIndex, i - 1);
                    await new Promise(r => setTimeout(r, 400));
                }
            }
            if (minIndex !== i) {
                swapCount++;
                updateStats();
                [arr[i], arr[minIndex]] = [arr[minIndex], arr[i]];
            }
            draw(-1, -1, i);
            await new Promise(r => setTimeout(r, 400));
        }
        resetBtn.disabled = false;
    }

    window.onload = resetArray;
</script>

</body>
</html>
