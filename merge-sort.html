<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進階合併排序動畫</title>
    <style>
        /* 保持一致的深色科技感風格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .back-link { 
            color: #94a3b8; 
            text-decoration: none; 
            margin: 0 auto 15px auto; 
            display: table; 
            transition: color 0.2s;
            font-size: 0.95em;
        }
        .back-link:hover { color: #38bdf8; }

        h2 { color: #38bdf8; margin-top: 0; margin-bottom: 20px; text-align: center; }

        #stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #38bdf8; display: block; }
        .stat-label { font-size: 0.8em; color: #94a3b8; }

        #container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 90%;
            max-width: 800px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .bar {
            flex: 1;
            margin: 0 4px;
            background: #38bdf8;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 12px;
            font-weight: bold;
            padding-top: 5px;
            color: white;
        }

        .controls { display: flex; gap: 15px; }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #0ea5e9; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← 回首頁</a>
    <h2>合併排序法 Merge Sort</h2>

    <div id="stats-container">
        <div class="stat-item">
            <span id="compare-count" class="stat-value">0</span>
            <span class="stat-label">比較次數</span>
        </div>
        <div class="stat-item">
            <span id="swap-count" class="stat-value">0</span>
            <span class="stat-label">合併次數</span>
        </div>
        <div class="stat-item">
            <span id="array-size" class="stat-value">10</span>
            <span class="stat-label">陣列大小</span>
        </div>
    </div>

    <div id="container"></div>

    <div class="controls">
        <button id="start-btn" onclick="startSort()">開始排序</button>
        <button id="reset-btn" onclick="resetArray()">隨機重置</button>
    </div>

<script>
    let arr = [];
    let compareCount = 0;
    let mergeCount = 0;
    const container = document.getElementById("container");
    const startBtn = document.getElementById("start-btn");
    const resetBtn = document.getElementById("reset-btn");

    function resetArray() {
        arr = [];
        for (let i = 0; i < 10; i++) {
            arr.push(Math.floor(Math.random() * 90) + 10);
        }
        compareCount = 0;
        mergeCount = 0;
        updateStats();
        draw();
        startBtn.disabled = false;
        resetBtn.disabled = false;
    }

    function updateStats() {
        document.getElementById("compare-count").innerText = compareCount;
        document.getElementById("swap-count").innerText = mergeCount;
        document.getElementById("array-size").innerText = arr.length;
    }

    function draw(activeIdxs = [], workingRange = []) {
        container.innerHTML = "";
        const maxVal = Math.max(...arr);
        
        arr.forEach((val, idx) => {
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${(val / maxVal) * 100}%`;
            bar.innerText = val;

            // 視覺配色
            if (activeIdxs.includes(idx)) {
                bar.style.background = "#ef4444"; // 正在比較的元素 (紅)
            } else if (idx >= workingRange[0] && idx <= workingRange[1]) {
                bar.style.background = "#f59e0b"; // 正在處理的子陣列範圍 (黃)
            }
            
            container.appendChild(bar);
        });
    }

    async function merge(l, m, r) {
        mergeCount++;
        updateStats();
        
        let n1 = m - l + 1;
        let n2 = r - m;
        let L = arr.slice(l, m + 1);
        let R = arr.slice(m + 1, r + 1);

        let i = 0, j = 0, k = l;

        while (i < n1 && j < n2) {
            compareCount++;
            updateStats();
            draw([k], [l, r]);
            await new Promise(res => setTimeout(res, 400));

            if (L[i] <= R[j]) {
                arr[k] = L[i];
                i++;
            } else {
                arr[k] = R[j];
                j++;
            }
            k++;
            draw([], [l, r]);
        }

        while (i < n1) {
            arr[k] = L[i];
            i++;
            k++;
            draw([], [l, r]);
            await new Promise(res => setTimeout(res, 200));
        }

        while (j < n2) {
            arr[k] = R[j];
            j++;
            k++;
            draw([], [l, r]);
            await new Promise(res => setTimeout(res, 200));
        }
    }

    async function mergeSort(l, r) {
        if (l >= r) return;
        let m = Math.floor(l + (r - l) / 2);
        
        await mergeSort(l, m);
        await mergeSort(m + 1, r);
        await merge(l, m, r);
    }

    async function startSort() {
        startBtn.disabled = true;
        resetBtn.disabled = true;
        await mergeSort(0, arr.length - 1);
        
        // 完成後標示為綠色
        const bars = document.querySelectorAll(".bar");
        bars.forEach(bar => bar.style.background = "#22c55e");
        
        resetBtn.disabled = false;
    }

    window.onload = resetArray;
</script>

</body>
</html>
