<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>進階選擇排序動畫</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 { color: #38bdf8; margin-bottom: 20px; }

        #stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #38bdf8; display: block; }
        .stat-label { font-size: 0.8em; color: #94a3b8; }

        #container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 90%;
            max-width: 800px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .bar {
            flex: 1;
            margin: 0 4px;
            background: #38bdf8;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 12px;
            font-weight: bold;
            padding-top: 5px;
            color: white;
        }

        .controls { display: flex; gap: 15px; }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #0ea5e9; }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        
        .back-link { color: #94a3b8; text-decoration: none; margin-bottom: 10px; align-self: flex-start; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">← 回首頁</a>
<h2>選擇排序法 Selection Sort</h2>

<div id="stats-container">
    <div class="stat-item">
        <span id="compare-count" class="stat-value">0</span>
        <span class="stat-label">比較次數</span>
    </div>
    <div class="stat-item">
        <span id="swap-count" class="stat-value">0</span>
        <span class="stat-label">交換次數</span>
    </div>
    <div class="stat-item">
        <span id="array-size" class="stat-value">8</span>
        <span class="stat-label">陣列大小</span>
    </div>
</div>

<div id="container"></div>

<div class="controls">
    <button id="start-btn" onclick="startSort()">開始排序</button>
    <button id="reset-btn" onclick="resetArray()">隨機重置</button>
</div>

<script>
    let arr = [];
    let compareCount = 0;
    let swapCount = 0;
    const container = document.getElementById("container");
    const startBtn = document.getElementById("start-btn");

    // 初始化與重置陣列
    function resetArray() {
        arr = [];
        const size = 8; // 固定為 8 個
        for (let i = 0; i < size; i++) {
            arr.push(Math.floor(Math.random() * 90) + 10);
        }
        compareCount = 0;
        swapCount = 0;
        updateStats();
        draw();
        startBtn.disabled = false;
    }

    function updateStats() {
        document.getElementById("compare-count").innerText = compareCount;
        document.getElementById("swap-count").innerText = swapCount;
        document.getElementById("array-size").innerText = arr.length;
    }

    function draw(scanningIdx = -1, minIdx = -1, sortedIdx = -1) {
        container.innerHTML = "";
        const maxVal = Math.max(...arr);
        
        arr.forEach((val, idx) => {
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${(val / maxVal) * 100}%`;
            bar.innerText = val;

            // 顏色邏輯
            if (idx <= sortedIdx) {
                bar.style.background = "#22c55e"; // 已排好 (綠)
            } else if (idx === minIdx) {
                bar.style.background = "#f59e0b"; // 當前最小 (黃)
            } else if (idx === scanningIdx) {
                bar.style.background = "#ef4444"; // 正在掃描 (紅)
            }

            container.appendChild(bar);
        });
    }

    async function startSort() {
        startBtn.disabled = true;
        document.getElementById("reset-btn").disabled = true;
        
        let n = arr.length;
        for (let i = 0; i < n; i++) {
            let minIndex = i;
            draw(-1, minIndex, i - 1);
            await new Promise(r => setTimeout(r, 400));

            for (let j = i + 1; j < n; j++) {
                compareCount++;
                updateStats();
                draw(j, minIndex, i - 1);
                await new Promise(r => setTimeout(r, 400));

                if (arr[j] < arr[minIndex]) {
                    minIndex = j;
                    draw(-1, minIndex, i - 1);
                    await new Promise(r => setTimeout(r, 400));
                }
            }

            if (minIndex !== i) {
                swapCount++;
                updateStats();
                [arr[i], arr[minIndex]] = [arr[minIndex], arr[i]];
            }
            draw(-1, -1, i); // 完成此輪
            await new Promise(r => setTimeout(r, 400));
        }
        
        document.getElementById("reset-btn").disabled = false;
    }

    // 頁面加載後自動執行一次初始化
    window.onload = resetArray;
</script>

</body>
</html>
