<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演算法學習平台 - 排序演算法</title>
    <style>
        /* 延續深色科技感風格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* 深藍黑色 */
            color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* 演算法卡片設計 */
        .card-container {
            display: grid;
            gap: 20px;
        }

        .algo-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .algo-card:hover {
            transform: translateY(-5px);
            background: #2d3e5a;
            border-color: #38bdf8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .algo-card h2 {
            margin: 0 0 10px 0;
            color: #38bdf8;
            font-size: 1.5rem;
        }

        .algo-card .badge {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .algo-card p {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }
